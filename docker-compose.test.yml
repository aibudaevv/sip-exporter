services:
  exporter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sip-exporter
    privileged: true
    network_mode: host
    pid: host
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
    environment:
      - SIP_EXPORTER_INTERFACE=${SIP_EXPORTER_INTERFACE}
      - SIP_EXPORTER_HTTP_PORT=2113
      - SIP_EXPORTER_SIP_PORT=5060
      - SIP_EXPORTER_SIPS_PORT=5061
      - SIP_EXPORTER_LOGGER_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:2113/metrics"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 5s

  sipp-server:
    image: pbertera/sipp:latest
    container_name: sipp-server
    networks:
      sip_macvlan:
        ipv4_address: ${SIPP_SERVER_IP}
    stdin_open: true
    tty: true
    volumes:
      - ./test/integration/sipp_scripts/ser:/scenarios:ro
      - ./test/results:/results
    entrypoint:
      - sipp
      - -sf
      - /scenarios/${UAS_SCENARIO:-uas_basic.xml}
      - -i
      - ${SIPP_SERVER_IP}
      - -p
      - "5060"
      - -nostdin
      - -trace_stat
      - -stf
      - /results/uas_stats.csv
    depends_on:
      exporter:
        condition: service_healthy

  sipp-client:
    image: pbertera/sipp:latest
    container_name: sipp-client
    networks:
      sip_macvlan:
        ipv4_address: ${SIPP_CLIENT_IP}
    volumes:
      - ./test/integration/sipp_scripts/ser:/scenarios:ro
      - ./test/results:/results
    entrypoint:
      - sipp
      - -sf
      - /scenarios/${UAC_SCENARIO:-uac_success.xml}
      - -i
      - ${SIPP_CLIENT_IP}
      - -p
      - "5061"
      - -m
      - "${CALL_COUNT:-100}"
      - -timeout
      - "30"
      - -trace_stat
      - -stf
      - /results/uac_stats.csv
      - ${SIPP_SERVER_IP}:5060
    depends_on:
      - sipp-server

networks:
  sip_macvlan:
    driver: macvlan
    driver_opts:
      parent: ${SIP_EXPORTER_INTERFACE}
    ipam:
      config:
        - subnet: ${SUBNET}
          gateway: ${GATEWAY}
          ip_range: ${IP_RANGE}




