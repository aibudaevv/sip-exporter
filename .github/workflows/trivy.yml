name: Container Scan

on:
  push:
    branches: [main, master, 'ab/**', develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --no-cache -t sip-exporter:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: sip-exporter:scan
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          scanners: vuln

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
          category: trivy
