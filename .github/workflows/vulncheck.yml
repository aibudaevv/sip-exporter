name: Go Vulncheck

on:
  push:
    branches: [main, master, 'ab/**', develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 6 * * *'

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'

      - name: Install dependencies
        run: go mod download

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
          output-format: sarif
          output-file: vulncheck.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: vulncheck.sarif
          category: govulncheck
