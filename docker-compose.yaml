services:
  sip-exporter:
    image: sip-exporter:0.4.0
    container_name: sip-exporter
    restart: unless-stopped
    environment:
      - SIP_EXPORTER_HTTP_PORT=2112
      - SIP_EXPORTER_INTERFACE=lo
      - SIP_EXPORTER_SIP_PORT=5060
      - SIP_EXPORTER_SIPS_PORT=5061
    privileged: true # require!
    volumes:
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: "host"  # only host!