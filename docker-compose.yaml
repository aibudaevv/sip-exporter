services:
  sip-exporter:
    image: frzq/sip-exporter:0.4.0
    container_name: sip-exporter
    restart: unless-stopped
    environment:
      - SIP_EXPORTER_INTERFACE=eth0  # Required: specify network interface (eth0, lo, etc.)
      - SIP_EXPORTER_HTTP_PORT=2112
      - SIP_EXPORTER_SIP_PORT=5060
      - SIP_EXPORTER_SIPS_PORT=5061
    privileged: true # Required for eBPF and packet socket
    volumes:
      - '/etc/localtime:/etc/localtime:ro'
      - '/etc/timezone:/etc/timezone:ro'
    network_mode: "host"  # Required for capturing network packets